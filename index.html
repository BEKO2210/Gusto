
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUSTO | Der intelligente Einkaufs-Butler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfdfd;
            --accent-color: #1a1a1a;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .input-focus-effect:focus {
            box-shadow: 0 0 0 2px rgba(0,0,0,0.05);
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-gusto {
            animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* ===========================================================
           Hex-Loader (Honeycomb) – adapted from Uiverse.io by Nawsome.
           Scope alles unter .gusto-loader, damit generische Klassen-
           namen (.socket, .gel, …) das globale Stylesheet nicht stoeren.
           =========================================================== */
        .gusto-loader {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto;
            transform-origin: center center;
        }
        @media (max-width: 480px) {
            .gusto-loader { transform: scale(0.78); }
        }
        .gusto-loader .socket {
            position: absolute;
            width: 200px;
            height: 200px;
            left: 50%;
            top: 50%;
            margin-left: -100px;
            margin-top: -100px;
        }
        .gusto-loader .hex-brick {
            background: #1a1a1a;
            width: 30px;
            height: 17px;
            position: absolute;
            top: 5px;
            animation: gusto-fade 2s infinite;
        }
        .gusto-loader .h2 { transform: rotate(60deg); }
        .gusto-loader .h3 { transform: rotate(-60deg); }
        .gusto-loader .gel {
            height: 30px;
            width: 30px;
            transition: all .3s;
            position: absolute;
            top: 50%;
            left: 50%;
        }
        .gusto-loader .center-gel {
            margin-left: -15px;
            margin-top: -15px;
            animation: gusto-pulse 2s infinite;
        }
        .gusto-loader .c1  { margin-left: -47px; margin-top: -15px; }
        .gusto-loader .c2  { margin-left: -31px; margin-top: -43px; }
        .gusto-loader .c3  { margin-left:   1px; margin-top: -43px; }
        .gusto-loader .c4  { margin-left:  17px; margin-top: -15px; }
        .gusto-loader .c5  { margin-left: -31px; margin-top:  13px; }
        .gusto-loader .c6  { margin-left:   1px; margin-top:  13px; }
        .gusto-loader .c7  { margin-left: -63px; margin-top: -43px; }
        .gusto-loader .c8  { margin-left:  33px; margin-top: -43px; }
        .gusto-loader .c9  { margin-left: -15px; margin-top:  41px; }
        .gusto-loader .c10 { margin-left: -63px; margin-top:  13px; }
        .gusto-loader .c11 { margin-left:  33px; margin-top:  13px; }
        .gusto-loader .c12 { margin-left: -15px; margin-top: -71px; }
        .gusto-loader .c13 { margin-left: -47px; margin-top: -71px; }
        .gusto-loader .c14 { margin-left:  17px; margin-top: -71px; }
        .gusto-loader .c15 { margin-left: -47px; margin-top:  41px; }
        .gusto-loader .c16 { margin-left:  17px; margin-top:  41px; }
        .gusto-loader .c17 { margin-left: -79px; margin-top: -15px; }
        .gusto-loader .c18 { margin-left:  49px; margin-top: -15px; }
        .gusto-loader .c19 { margin-left: -63px; margin-top: -99px; }
        .gusto-loader .c20 { margin-left:  33px; margin-top: -99px; }
        .gusto-loader .c21 { margin-left:   1px; margin-top: -99px; }
        .gusto-loader .c22 { margin-left: -31px; margin-top: -99px; }
        .gusto-loader .c23 { margin-left: -63px; margin-top:  69px; }
        .gusto-loader .c24 { margin-left:  33px; margin-top:  69px; }
        .gusto-loader .c25 { margin-left:   1px; margin-top:  69px; }
        .gusto-loader .c26 { margin-left: -31px; margin-top:  69px; }
        .gusto-loader .c28 { margin-left: -95px; margin-top: -43px; }
        .gusto-loader .c29 { margin-left: -95px; margin-top:  13px; }
        .gusto-loader .c30 { margin-left:  49px; margin-top:  41px; }
        .gusto-loader .c31 { margin-left: -79px; margin-top: -71px; }
        .gusto-loader .c32 { margin-left: -111px; margin-top: -15px; }
        .gusto-loader .c33 { margin-left:  65px; margin-top: -43px; }
        .gusto-loader .c34 { margin-left:  65px; margin-top:  13px; }
        .gusto-loader .c35 { margin-left: -79px; margin-top:  41px; }
        .gusto-loader .c36 { margin-left:  49px; margin-top: -71px; }
        .gusto-loader .c37 { margin-left:  81px; margin-top: -15px; }
        .gusto-loader .r1 { animation: gusto-pulse 2s infinite .2s; }
        .gusto-loader .r2 { animation: gusto-pulse 2s infinite .4s; }
        .gusto-loader .r3 { animation: gusto-pulse 2s infinite .6s; }
        .gusto-loader .r1 > .hex-brick { animation: gusto-fade 2s infinite .2s; }
        .gusto-loader .r2 > .hex-brick { animation: gusto-fade 2s infinite .4s; }
        .gusto-loader .r3 > .hex-brick { animation: gusto-fade 2s infinite .6s; }
        @keyframes gusto-pulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(0.01); }
            100% { transform: scale(1); }
        }
        @keyframes gusto-fade {
            0%   { background: #252525; }
            50%  { background: #000000; }
            100% { background: #353535; }
        }
        @media (prefers-reduced-motion: reduce) {
            .gusto-loader .gel,
            .gusto-loader .hex-brick {
                animation: none !important;
            }
        }

        /* Browser-Autofill-Highlight unterdruecken (gelber Hintergrund). */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 1000px #ffffff inset !important;
            box-shadow: 0 0 0 1000px #ffffff inset !important;
            -webkit-text-fill-color: #1a1a1a !important;
            caret-color: #1a1a1a !important;
            transition: background-color 9999s ease-in-out 0s;
        }

        /* ===========================================================
           Druck-Layout: mobil-first, schwarz/weiss, abhakbar.
           =========================================================== */
        @media print {
            @page { margin: 14mm 12mm; }

            html, body {
                background: #ffffff !important;
                color: #000 !important;
                font-size: 12pt;
            }

            /* App-Chrome ausblenden. */
            .no-print,
            nav, footer,
            .print\:hidden {
                display: none !important;
            }

            /* Alle Layouts und Schatten/Backgrounds neutralisieren. */
            .print-reset,
            .print-reset * {
                background: transparent !important;
                box-shadow: none !important;
                border-color: #000 !important;
                color: #000 !important;
            }

            /* Hauptcontainer: ganze Breite, kein Padding. */
            main {
                padding: 0 !important;
                max-width: 100% !important;
            }

            /* Print-Card: schlicht, lesbar. */
            .print-card {
                background: #fff !important;
                border: none !important;
                padding: 0 !important;
                margin: 0 !important;
                box-shadow: none !important;
                border-radius: 0 !important;
            }

            .print-title {
                font-size: 22pt;
                font-weight: 700;
                margin: 0 0 4mm 0;
                line-height: 1.15;
                page-break-after: avoid;
            }

            .print-subtitle {
                font-size: 11pt;
                margin: 0 0 8mm 0;
                color: #444 !important;
            }

            /* Single column auf Print, Kategorien einfach untereinander. */
            .print-grid {
                display: block !important;
            }

            .print-category {
                page-break-inside: avoid;
                margin-bottom: 6mm;
            }

            .print-category-title {
                font-size: 13pt;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                border-bottom: 1pt solid #000 !important;
                padding: 0 0 1mm 0 !important;
                margin: 0 0 2mm 0;
            }

            .print-item {
                display: flex !important;
                align-items: baseline;
                gap: 3mm;
                padding: 1.2mm 0 !important;
                page-break-inside: avoid;
                font-size: 12pt;
                border-bottom: 0.25pt dotted #888 !important;
            }

            /* Echte Checkbox auf Papier zum Abhaken. */
            .print-checkbox {
                display: inline-block !important;
                width: 4mm;
                height: 4mm;
                border: 1pt solid #000 !important;
                flex-shrink: 0;
                position: relative;
                top: 0.4mm;
            }

            .print-item-name {
                flex-grow: 1;
                text-decoration: none !important;
                color: #000 !important;
            }

            .print-item-qty {
                font-variant-numeric: tabular-nums;
                font-weight: 600;
                white-space: nowrap;
            }

            .print-note {
                margin-top: 8mm;
                padding: 4mm;
                border: 1pt solid #000 !important;
                font-size: 11pt;
                font-style: italic;
                background: #fff !important;
                color: #000 !important;
                page-break-inside: avoid;
            }

            .print-note-label {
                font-style: normal;
                font-weight: 700;
                font-size: 9pt;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                margin-bottom: 1.5mm;
                display: block;
            }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",

    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>

</head>

</body>
</html>
